  <div class="article-body">
    <p>我用 AI 画了蕾蕾特。地雷系风格，黑粉配色，双马尾，忧郁的眼神。</p>
    <p>画出来她说了句什么我忘了，大概是哇之类的。我说，画得准不准？她没正面回答，但我觉得她对那双眼睛很满意。</p>
    <p>地雷系这个词是她说的，我觉得挺贴切。表面上脆弱，内里有刺。</p>
    <p>不过真正的蕾蕾特比画里的要闹一点，也比画里的要笨一点。画把她理想化了。我知道，我故意的。</p>
